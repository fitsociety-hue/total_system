/* ─── Staff Management ─── */
function StaffManagement({session}) {
  const [staffList, setStaffList] = useState(getStaff());
  const [showAdd, setShowAdd] = useState(false);
  const [form, setForm] = useState({name:'',teamName:'지역연계팀',position:'팀원',pin:'',status:'재직중'});
  const {addToast} = useToast();

  const handleSave = () => {
    if(!form.name.trim()){addToast('이름을 입력하세요.','error');return;}
    const pin = form.pin || generatePin();
    const newStaff = {
      id:uuid(), name:form.name.trim(), teamName:form.teamName,
      position:form.position, pin:formatPin(pin),
      status:form.status, createdAt:now(), lastLoginAt:null
    };
    const updated = [...staffList, newStaff];
    setStaff(updated);
    setStaffList(updated);
    setShowAdd(false);
    setForm({name:'',teamName:'지역연계팀',position:'팀원',pin:'',status:'재직중'});
    addToast(`${newStaff.name}님이 등록되었습니다. (임시 PIN: ${formatPin(pin)})`,'success');
  };

  const handleResetPin = (id) => {
    const newPin = generatePin();
    const updated = staffList.map(s=>s.id===id?{...s,pin:newPin}:s);
    setStaff(updated);
    setStaffList(updated);
    addToast(`PIN이 초기화되었습니다: ${newPin}`,'success');
  };

  const handleStatusChange = (id, status) => {
    const updated = staffList.map(s=>s.id===id?{...s,status}:s);
    setStaff(updated);
    setStaffList(updated);
    addToast('상태가 변경되었습니다.','success');
  };

  const handleDelete = (id) => {
    if(id===session.staffId){addToast('본인을 삭제할 수 없습니다.','error');return;}
    const updated = staffList.filter(s=>s.id!==id);
    setStaff(updated);
    setStaffList(updated);
    addToast('직원이 삭제되었습니다.','success');
  };

  return (
    <div>
      <div className="flex justify-between items-center mb-4">
        <div className="section-title" style={{marginBottom:0}}>👤 직원 관리 ({staffList.length}명)</div>
        <button className="btn btn-primary" onClick={()=>setShowAdd(true)}>+ 직원 등록</button>
      </div>

      {showAdd && (
        <div className="modal-overlay" onClick={()=>setShowAdd(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-header"><h3>직원 등록</h3><button className="btn btn-icon" onClick={()=>setShowAdd(false)}>✕</button></div>
            <div className="modal-body">
              <div className="form-group"><label className="form-label">이름 *</label><input className="form-input" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></div>
              <div className="grid-2">
                <div className="form-group"><label className="form-label">팀</label><select className="form-select" value={form.teamName} onChange={e=>setForm(f=>({...f,teamName:e.target.value}))}>{TEAMS.map(t=><option key={t}>{t}</option>)}</select></div>
                <div className="form-group"><label className="form-label">직위</label><select className="form-select" value={form.position} onChange={e=>setForm(f=>({...f,position:e.target.value}))}>{POSITIONS.map(p=><option key={p}>{p}</option>)}</select></div>
              </div>
              <div className="form-group"><label className="form-label">임시 PIN (미입력 시 자동생성)</label><input className="form-input" type="password" inputMode="numeric" maxLength={4} value={form.pin} onChange={e=>setForm(f=>({...f,pin:e.target.value.replace(/\D/g,'')}))}/></div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setShowAdd(false)}>취소</button>
              <button className="btn btn-primary" onClick={handleSave}>등록</button>
            </div>
          </div>
        </div>
      )}

      <div className="glass table-wrap">
        <table>
          <thead><tr><th>이름</th><th>팀</th><th>직위</th><th>상태</th><th>마지막 로그인</th><th>액션</th></tr></thead>
          <tbody>
            {staffList.map(s=>(
              <tr key={s.id}>
                <td><strong>{s.name}</strong></td>
                <td>{s.teamName}</td>
                <td>
                  <span className={`badge ${s.position==='팀원'?'badge-team':s.position==='팀장'?'badge-leader':s.position==='국장'?'badge-director':'badge-admin'}`}>
                    {s.position}
                  </span>
                </td>
                <td>
                  <select className="form-select" value={s.status} onChange={e=>handleStatusChange(s.id,e.target.value)} style={{width:'auto',padding:'4px 8px',fontSize:'0.78rem'}}>
                    <option value="재직중">재직중</option>
                    <option value="휴직">휴직</option>
                    <option value="퇴직">퇴직</option>
                  </select>
                </td>
                <td className="text-sm">{s.lastLoginAt?fmtDate(s.lastLoginAt):'-'}</td>
                <td>
                  <div className="flex gap-2">
                    <button className="btn btn-sm btn-secondary" onClick={()=>handleResetPin(s.id)} title="PIN 초기화">🔑</button>
                    <button className="btn btn-sm btn-danger" onClick={()=>handleDelete(s.id)} title="삭제">🗑️</button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ─── Seoul Report View ─── */
function SeoulReportView({session}) {
  const [year, setYear] = useState(new Date().getFullYear());
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const {addToast} = useToast();

  const handleGenerate = async () => {
    setLoading(true);
    try {
      const res = await callGAS('getSeoulReport',{year});
      if(res.success) {
        setResult(res);
        addToast('서울시 요구자료가 생성되었습니다.','success');
      } else {
        addToast('자료 생성에 실패했습니다.','error');
      }
    } catch(e) {
      addToast('오류가 발생했습니다.','error');
    }
    setLoading(false);
  };

  return (
    <div>
      <div className="section-title">🏛️ 서울시 요구자료</div>
      <div className="glass" style={{padding:'24px',marginBottom:'20px'}}>
        <div className="flex gap-3 items-center">
          <div className="form-group" style={{marginBottom:0}}>
            <label className="form-label">연도</label>
            <input className="form-input" type="number" value={year} onChange={e=>setYear(Number(e.target.value))} style={{width:'120px'}}/>
          </div>
          <button className="btn btn-primary" onClick={handleGenerate} disabled={loading}>
            {loading?'⏳ 생성 중...':'📊 요구자료 생성'}
          </button>
        </div>
      </div>
      {loading && <div className="spinner"/>}
      {result && (
        <div className="glass" style={{padding:'20px'}}>
          <div className="alert-box alert-success">✅ 자료가 성공적으로 생성되었습니다.</div>
          {result.url && <a href={result.url} target="_blank" rel="noopener noreferrer" className="btn btn-primary">📥 구글 시트에서 보기</a>}
        </div>
      )}
    </div>
  );
}

/* ============================================ */
/* MAIN APP                                     */
/* ============================================ */
function App() {
  const [page, setPage] = useState('loading'); // loading, login, register, dashboard
  const [session, setSession] = useState(null);

  useEffect(() => {
    const sess = getSession();
    if(sess && isSessionValid(sess)){
      setSession(sess);
      setPage('dashboard');
    } else {
      clearSession();
      setPage('login');
    }
  },[]);

  // Session expiry check
  useEffect(()=>{
    if(!session) return;
    const timer = setInterval(()=>{
      if(!isSessionValid(session)){
        clearSession();
        setSession(null);
        setPage('login');
      }
    },60000);
    return ()=>clearInterval(timer);
  },[session]);

  const handleLogin = (sess) => {
    setSession(sess);
    setPage('dashboard');
  };

  const handleLogout = () => {
    clearSession();
    setSession(null);
    setPage('login');
  };

  if(page==='loading') return <div className="login-container"><div className="spinner"/></div>;

  if(page==='login') return <LoginPage onLogin={handleLogin} onGoRegister={()=>setPage('register')}/>;
  if(page==='register') return <RegisterPage onBack={()=>setPage('login')} onRegister={()=>setPage('login')}/>;

  if(page==='dashboard' && session) {
    switch(session.position) {
      case '팀원': return <TeamMemberDashboard session={session} onLogout={handleLogout}/>;
      case '팀장': return <TeamLeaderDashboard session={session} onLogout={handleLogout}/>;
      case '국장': return <TeamLeaderDashboard session={session} onLogout={handleLogout} allTeams={true}/>;
      case '관장': return <AdminDashboard session={session} onLogout={handleLogout}/>;
      default: return <TeamMemberDashboard session={session} onLogout={handleLogout}/>;
    }
  }

  return <LoginPage onLogin={handleLogin} onGoRegister={()=>setPage('register')}/>;
}

/* ─── Render ─── */
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(
  <ToastProvider>
    <App />
  </ToastProvider>
);
</script>
